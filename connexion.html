<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoNova - Connexion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="logo">AutoNova</div>
      <div class="filters">
        <h2>Compte</h2>
        <div class="filter-block">
          <h3>Navigation</h3>
          <label><a href="index.html">Accueil</a></label>
          <label><a href="inscription.html">Créer un compte</a></label>
          <label><a href="connexion.html">Connexion</a></label>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <h1>Connexion</h1>
        <nav class="nav-menu">
          <a href="index.html">Accueil</a>
          <a href="inscription.html">Inscription</a>
          <a href="connexion.html" class="active">Connexion</a>
        </nav>
      </header>

      <section class="form-box auth-box">
        <h2>Se connecter</h2>
        <p>Connecte-toi pour créer des ventes et consulter uniquement tes propres annonces.</p>

        <form id="loginForm" class="form-grid">
          <div class="form-group full">
            <label for="email">Adresse email</label>
            <input id="email" name="email" type="email" placeholder="exemple@mail.com" required />
          </div>

          <div class="form-group full">
            <label for="password">Mot de passe</label>
            <input id="password" name="password" type="password" placeholder="Ton mot de passe" required />
          </div>

          <div class="form-actions full">
            <button type="submit" class="primary-btn">Se connecter</button>
            <a href="inscription.html" class="secondary-btn">Créer un compte</a>
          </div>
        </form>

        <div id="message" class="alert"></div>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
