<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoNova - Mes ventes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="logo">AutoNova</div>
      <div class="filters">
        <h2>Vendeur</h2>
        <div class="filter-block">
          <h3>Actions</h3>
          <label><a href="creer-vente.html">Créer une vente</a></label>

      </div>
    </aside>

        <h1>Mes ventes</h1>
        <nav class="nav-menu">

          <a href="#">Catalogue</a>

  <script src="js/config.js"></script>
